<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ingestão de Arquivos Excel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212; /* Fundo preto */
            color: #ffffff; /* Texto branco */
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }

        h2 {
            color: #ffffff; /* Título em branco */
        }

        form {
            background: #1e1e1e; /* Fundo do formulário em cinza escuro */
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        input[type="file"] {
            margin: 20px 0;
            color: #ffffff; /* Texto do input em branco */
        }

        input[type="submit"] {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #0056b3;
        }

        .messages {
            margin-top: 20px;
            width: 400px;
        }

        .messages ul {
            list-style: none;
            padding: 0;
        }

        .messages li {
            background-color: #2e8b57; /* Fundo das mensagens */
            border-left: 5px solid #1b5e20;
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 5px;
            color: #ffffff; /* Texto das mensagens em branco */
        }
    </style>
</head>
<body>
    <h2>Processamento de Arquivos Excel</h2>

    <form method="POST" enctype="multipart/form-data">
        <label for="file">Selecione os arquivos .xls</label>
        <input type="file" name="file" multiple accept=".xls" required>
        <input type="submit" value="Enviar e Processar">
    </form>

    <div class="messages">
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <ul>
            {% for message in messages %}
              <li>{{ message }}</li>
            {% endfor %}
            </ul>
          {% endif %}
        {% endwith %}
    </div>
</body>
</html>
