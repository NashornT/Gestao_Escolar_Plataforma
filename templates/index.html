<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ingestão de Arquivos Excel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        h2 {
            margin-top: 30px;
            margin-bottom: 20px;
            font-size: 28px;
            text-align: center;
        }

        .container {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 500px;
        }

        label {
            margin-bottom: 10px;
            font-size: 16px;
            display: block;
            text-align: center;
        }

        input[type="file"] {
            width: 100%;
            margin: 10px 0 20px;
            background-color: #2a2a2a;
            border: 1px solid #444;
            color: #ddd;
            padding: 10px;
            border-radius: 5px;
        }

        .btn {
            display: inline-block;
            background-color: #007bff;
            color: white;
            padding: 12px 25px;
            margin-top: 10px;
            text-align: center;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 15px;
            width: 100%;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        .btn-secondary {
            background-color: #28a745;
        }

        .btn-secondary:hover {
            background-color: #1e7e34;
        }

        .messages {
            margin-top: 20px;
            width: 100%;
            max-width: 500px;
        }

        .messages ul {
            list-style: none;
            padding: 0;
        }

        .messages li {
            background-color: #2e8b57;
            border-left: 5px solid #1b5e20;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 5px;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <h2>📄 Processamento de Arquivos</h2>

    <div class="container">
        <form method="POST" enctype="multipart/form-data">
            <label for="files">Selecione os arquivos .xls</label>
            <input type="file" name="files" id="files" multiple accept=".xls" required>
            <button type="submit" class="btn">Enviar e Processar</button>
        </form>

        <form action="/relatorio" method="get">
            <button type="submit" class="btn btn-secondary">Gerar Relatório</button>
        </form>
    </div>

    <div class="messages">
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <ul>
            {% for message in messages %}
              <li>{{ message }}</li>
            {% endfor %}
            </ul>
          {% endif %}
        {% endwith %}
    </div>
</body>
</html>
