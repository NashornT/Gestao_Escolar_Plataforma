<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Escolar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
    <div class="container my-5">
        <h1 class="text-center mb-4">Gestão Escolar</h1>

        <!-- Mensagens de Feedback -->
        <div class="container my-3">
            {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert alert-info" role="alert">
                    {% for message in messages %}
                        <p>{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}
            {% endwith %}
        </div>

        <!-- Seção para Processar Arquivos -->
        <div class="card mb-4 bg-secondary text-white">
            <div class="card-header bg-primary text-white">
                <h2>Processar Arquivos</h2>
            </div>
            <div class="card-body">
                <form action="/" method="post" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="files" class="form-label">Selecione os arquivos (.xls):</label>
                        <input type="file" name="files" id="files" class="form-control" multiple>
                    </div>
                    <button type="submit" class="btn btn-success">Processar</button>
                </form>
            </div>
        </div>

        <!-- Seção para Gerar Relatório -->
        <div class="card mb-4 bg-secondary text-white">
            <div class="card-header bg-info text-white">
                <h2>Gerar Relatório</h2>
            </div>
            <div class="card-body">
                <a href="/relatorio" class="btn btn-light">Abrir Relatório</a>
            </div>
        </div>

        <!-- Seção para Baixar Histórico -->
        <div class="card bg-secondary text-white">
            <div class="card-header bg-warning text-dark">
                <h2>Baixar Histórico Escolar</h2>
            </div>
            <div class="card-body">
                <form action="/historico" method="post">
                    <div class="mb-3">
                        <label for="aluno" class="form-label">Nome do Aluno:</label>
                        <input type="text" name="aluno" id="aluno" class="form-control" placeholder="Digite o nome do aluno" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Baixar Histórico</button>
                </form>
            </div>
        </div>

        <!-- Seção para Baixar Dados -->
        <div class="card bg-secondary text-white my-4">
            <div class="card-header bg-success text-white">
                <h2>Baixar Dados</h2>
            </div>
            <div class="card-body py-3">
                <a href="/baixar_dados" class="btn btn-light">Baixar Dados</a>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
