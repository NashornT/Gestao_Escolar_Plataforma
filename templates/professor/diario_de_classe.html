<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Diário de Classe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #2c3e50; color: #ecf0f1; }
        .card { border-radius: 0.75rem; margin-bottom: 1.5rem; }
        .card-header { font-weight: bold; background-color: #3498db; }
        .list-group-item { background-color: #34495e; border-color: #4e6a87; }
        #lista-presenca .list-group-item { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
 <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    </nav>

    <div class="container mt-4">
        <div id="alert-placeholder"></div>
        <div class="row">
            <div class="col-md-5">
                <div class="card bg-dark text-white">
                    <div class="card-header">
                        <h4>Registrar Aula</h4>
                    </div>
                    <div class="card-body">
                        <form id="diarioForm">
                            <div class="mb-3">
                                <label for="turmaSelect" class="form-label">Turma</label>
                                <select id="turmaSelect" name="turma_id" class="form-select" required>
                                    <option value="" disabled selected>Selecione...</option>
                                    {% for turma in turmas %}
                                        <option value="{{ turma.turma_id }}">{{ turma.turma }} - {{ turma.turno }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="disciplinaSelect" class="form-label">Disciplina</label>
                                <select id="disciplinaSelect" name="disciplina_id" class="form-select" required disabled>
                                    <option value="" disabled selected>Selecione uma turma...</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="data_aula" class="form-label">Data da Aula</label>
                                <input type="date" class="form-control" id="data_aula" name="data_aula" required>
                            </div>
                            <div class="mb-3">
                                <label for="conteudo_ministrado" class="form-label">Conteúdo Ministrado</label>
                                <textarea class="form-control" id="conteudo_ministrado" name="conteudo_ministrado" rows="5" required></textarea>
                            </div>
                             <div class="mb-3">
                                <label for="observacoes" class="form-label">Observações (Opcional)</label>
                                <textarea class="form-control" id="observacoes" name="observacoes" rows="3"></textarea>
                            </div>
                            <button type="submit" class="btn btn-success">Salvar Registro de Aula</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <div class="card bg-dark text-white">
                    <div class="card-header"><h4>Controle de Presença da Aula Atual</h4></div>
                    <div class="card-body" style="max-height: 300px; overflow-y: auto;">
                        <p id="presenca-placeholder">Selecione uma turma para listar os alunos.</p>
                        <ul id="lista-presenca" class="list-group"></ul>
                    </div>
                </div>

                <div class="card bg-dark text-white">
                    <div class="card-header"><h4>Histórico de Aulas Registradas</h4></div>
                    <div id="historico-container" class="list-group p-3" style="max-height: 400px; overflow-y: auto;">
                        <p id="historico-placeholder" class="text-center">Selecione uma turma e disciplina para ver o histórico.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const turmaSelect = document.getElementById('turmaSelect');
    const disciplinaSelect = document.getElementById('disciplinaSelect');
    const diarioForm = document.getElementById('diarioForm');

    // Elementos da Presença
    const presencaPlaceholder = document.getElementById('presenca-placeholder');
    const listaPresenca = document.getElementById('lista-presenca');

    // Elementos do Histórico
    const historicoContainer = document.getElementById('historico-container');
    const historicoPlaceholder = document.getElementById('historico-placeholder');

    async function handleResponse(response) {
        const data = await response.json();
        if (!response.ok) throw new Error(data.message || 'Ocorreu um erro.');
        return data;
    }

    // Carregar disciplinas quando a turma muda
    turmaSelect.addEventListener('change', function() {
        disciplinaSelect.innerHTML = '<option value="" disabled selected>Carregando...</option>';
        disciplinaSelect.disabled = true;

        // Limpa as duas seções da direita
        listaPresenca.innerHTML = '';
        historicoContainer.innerHTML = '';
        presencaPlaceholder.textContent = 'Selecione uma turma para listar os alunos.';
        historicoPlaceholder.textContent = 'Selecione uma turma e disciplina para ver o histórico.';

        const turmaId = this.value;
        if (!turmaId) return;

        // Busca as disciplinas
        fetch(`/professor/api/disciplinas_por_turma?turma_id=${turmaId}`)
            .then(handleResponse)
            .then(disciplinas => {
                disciplinaSelect.innerHTML = '<option value="" disabled selected>Selecione...</option>';
                disciplinas.forEach(d => {
                    disciplinaSelect.innerHTML += `<option value="${d.disciplina_id}">${d.disciplina}</option>`;
                });
                disciplinaSelect.disabled = false;
            })
            .catch(error => showAlert(error.message, 'danger'));

        // Busca os alunos para a chamada
        buscarAlunosDaTurma(turmaId);
    });

    disciplinaSelect.addEventListener('change', buscarHistorico);

    async function buscarAlunosDaTurma(turmaId) {
        presencaPlaceholder.textContent = 'Carregando alunos...';
        try {
            const alunos = await fetch(`/professor/api/alunos_por_turma?turma_id=${turmaId}`).then(handleResponse);
            presencaPlaceholder.style.display = 'none';
            alunos.forEach(aluno => {
                const item = document.createElement('li');
                item.className = 'list-group-item';
                item.dataset.alunoId = aluno.aluno_id;
                item.innerHTML = `
                    <span>${aluno.aluno}</span>
                    <div class="btn-group" role="group">
                        <input type="radio" class="btn-check" name="presenca-${aluno.aluno_id}" id="pres-${aluno.aluno_id}" value="Presente" checked>
                        <label class="btn btn-outline-success btn-sm" for="pres-${aluno.aluno_id}">P</label>
                        <input type="radio" class="btn-check" name="presenca-${aluno.aluno_id}" id="aus-${aluno.aluno_id}" value="Ausente">
                        <label class="btn btn-outline-danger btn-sm" for="aus-${aluno.aluno_id}">A</label>
                    </div>
                `;
                listaPresenca.appendChild(item);
            });
        } catch(error) {
            showAlert('Erro ao carregar alunos: ' + error.message, 'danger');
        }
    }

    async function buscarHistorico() {
        const turmaId = turmaSelect.value;
        const disciplinaId = disciplinaSelect.value;

        if (!turmaId || !disciplinaId) return;

        historicoPlaceholder.textContent = 'Carregando histórico...';
        historicoContainer.innerHTML = ''; // Limpa antes de popular

        try {
            const entradas = await fetch(`/professor/api/diario/entradas?turma_id=${turmaId}&disciplina_id=${disciplinaId}`).then(handleResponse);
            if (entradas.length === 0) {
                 historicoPlaceholder.textContent = 'Nenhum registro encontrado para esta seleção.';
                 historicoContainer.appendChild(historicoPlaceholder);
            } else {
                entradas.forEach(entrada => {
                    const dataFormatada = new Date(entrada.data_aula + 'T00:00:00').toLocaleDateString('pt-BR');
                    const item = document.createElement('div');
                    item.className = 'list-group-item list-group-item-action flex-column align-items-start bg-dark text-white mb-2';
                    item.innerHTML = `
                        <div class="d-flex w-100 justify-content-between">
                            <h5 class="mb-1">Aula de ${dataFormatada}</h5>
                        </div>
                        <p class="mb-1"><strong>Conteúdo:</strong> ${entrada.conteudo_ministrado.replace(/\n/g, '<br>')}</p>
                        ${entrada.observacoes ? `<small><strong>Observações:</strong> ${entrada.observacoes.replace(/\n/g, '<br>')}</small>` : ''}
                    `;
                    historicoContainer.appendChild(item);
                });
            }
        } catch(error) {
            showAlert('Erro ao carregar histórico: ' + error.message, 'danger');
        }
    }

    diarioForm.addEventListener('submit', function(event) {
        event.preventDefault();
        const formData = new FormData(this);
        const data = Object.fromEntries(formData.entries());

        const presencas = {};
        listaPresenca.querySelectorAll('li').forEach(item => {
            const alunoId = item.dataset.alunoId;
            const status = document.querySelector(`input[name="presenca-${alunoId}"]:checked`).value;
            presencas[alunoId] = status;
        });
        data.presencas = presencas;

        fetch('/professor/api/diario/salvar', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        })
        .then(handleResponse)
        .then(response => {
            showAlert(response.message, 'success');
            // Mantém os selects e recarrega apenas o histórico
            document.getElementById('data_aula').value = '';
            document.getElementById('conteudo_ministrado').value = '';
            document.getElementById('observacoes').value = '';
            buscarHistorico();
        })
        .catch(error => showAlert(error.message, 'danger'));
    });

    function showAlert(message, type = 'info') {
        const placeholder = document.getElementById('alert-placeholder');
        const wrapper = document.createElement('div');
        wrapper.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show" role="alert"><div>${message}</div><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>`;
        placeholder.innerHTML = '';
        placeholder.append(wrapper);
    }
});
</script>

</body>
</html>
