<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Criar Nova Turma - Gestão Escolar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #2c3e50; color: #ecf0f1; }
        .card { max-width: 600px; margin: 2rem auto; }
        .card-header { font-weight: bold; background-color: #3498db; }
    </style>
</head>
<body>
 <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('main_bp.get_files') }}">Gestão Escolar</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'main_bp.get_files' %}active{% endif %}" href="{{ url_for('main_bp.get_files') }}">Início</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('main_bp.baixar_dados') }}">Baixar Dados Gerais</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'main_bp.listar_usuarios' %}active{% endif %}" href="{{ url_for('main_bp.listar_usuarios') }}">Gerenciar Usuários</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'main_bp.criar_usuario' %}active{% endif %}" aria-current="page" href="{{ url_for('main_bp.criar_usuario') }}">Criar Usuário</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'main_bp.relatorios' %}active{% endif %}" href="{{ url_for('main_bp.relatorios') }}">Relatórios</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'main_bp.gerenciar_matriculas' %}active{% endif %}" href="{{ url_for('main_bp.gerenciar_matriculas') }}">Matrículas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'main_bp.auditoria' %}active{% endif %}" href="{{ url_for('main_bp.auditoria') }}">Auditoria</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'main_bp.criar_turma' %}active{% endif %}" aria-current="page" href="{{ url_for('main_bp.criar_turma') }}">Criar Turma</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link" href="#" id="notificationBell" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <span class="position-relative">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-bell-fill" viewBox="0 0 16 16"><path d="M8 16a2 2 0 0 0 2-2H6a2 2 0 0 0 2 2zm.995-14.901a1 1 0 1 0-1.99 0A5.002 5.002 0 0 0 3 6c0 1.098-.5 6-2 7h14c-1.5-1-2-5.902-2-7 0-2.42-1.72-4.44-4.005-4.901z"/></svg>
                                <span id="notificationCount" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="display: none;"></span>
                            </span>
                        </a>
                        <ul id="notificationList" class="dropdown-menu dropdown-menu-dark dropdown-menu-end" aria-labelledby="notificationBell"></ul>
                    </li>
                    <li class="nav-item">
                        <span class="nav-link">Bem-vindo, {{ username }} ({{ user_role }})</span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('account.mudar_senha') }}">Mudar Senha</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link btn btn-danger text-white" href="{{ url_for('auth.logout') }}">Sair</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div id="alert-placeholder"></div>
        <div class="card bg-dark text-white">
            <div class="card-header">
                <h2>Criar Nova Turma</h2>
            </div>
            <div class="card-body">
                <form id="formCriarTurma">
                    <div class="mb-3">
                        <label for="nomeTurma" class="form-label">Nome da Turma</label>
                        <input type="text" class="form-control" id="nomeTurma" required>
                    </div>
                    <div class="mb-3">
                        <label for="turno" class="form-label">Turno</label>
                        <select class="form-select" id="turno" required>
                            <option value="Manhã">Manhã</option>
                            <option value="Tarde">Tarde</option>
                            <option value="Noite">Noite</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="anoLetivo" class="form-label">Ano Letivo</label>
                        <input type="number" class="form-control" id="anoLetivo" required>
                    </div>
                    <button type="submit" class="btn btn-success">Salvar Turma</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('formCriarTurma').addEventListener('submit', async function (e) {
            e.preventDefault();
            const nomeTurma = document.getElementById('nomeTurma').value;
            const turno = document.getElementById('turno').value;
            const anoLetivo = document.getElementById('anoLetivo').value;

            const response = await fetch('/api/criar_turma', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    nome_turma: nomeTurma,
                    turno: turno,
                    ano_letivo: anoLetivo
                })
            });

            const data = await response.json();
            const alertPlaceholder = document.getElementById('alert-placeholder');

            if (response.ok) {
                alertPlaceholder.innerHTML = `<div class="alert alert-success">${data.message}</div>`;
                document.getElementById('formCriarTurma').reset();
            } else {
                alertPlaceholder.innerHTML = `<div class="alert alert-danger">${data.message}</div>`;
            }
        });
    </script>
</body>
</html>
