<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Criar Novo Usuário - Gestão Escolar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #2c3e50; color: #ecf0f1; }
        .card { max-width: 700px; margin: 2rem auto; }
        .card-header { background-color: #3498db; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container mt-4">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="card bg-dark text-white">
            <div class="card-header">
                <h2>Criar Novo Usuário</h2>
            </div>
            <div class="card-body">
                <form id="createUserForm" action="{{ url_for('main_bp.criar_usuario') }}" method="post">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="username" class="form-label">Nome de Usuário</label>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="password" class="form-label">Senha</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                    </div>
                    <div class="form-check mb-3">
                        <input type="checkbox" class="form-check-input" id="is_professor" name="is_professor">
                        <label class="form-check-label" for="is_professor">É Professor?</label>
                    </div>
                     <div class="form-check mb-3">
                        <input type="checkbox" class="form-check-input" id="is_admin" name="is_admin">
                        <label class="form-check-label" for="is_admin">É Administrador?</label>
                    </div>

                    <div id="professorFields" class="hidden">
                        <hr>
                        <h4>Detalhes do Professor</h4>
                        <div class="mb-3">
                            <label for="nome_completo" class="form-label">Nome Completo</label>
                            <input type="text" class="form-control" id="nome_completo" name="nome_completo">
                        </div>
                        <h5>Atribuir Turmas e Disciplinas</h5>
                        <div class="row align-items-end">
                            <div class="col-md-5">
                                <label for="turmaSelect" class="form-label">Turma</label>
                                <select id="turmaSelect" class="form-select">
                                     <option value="">Selecione...</option>
                                    {% for t in turmas %}
                                    <option value="{{ t.turma_id }}" data-ano="{{ t.ano_escolar }}">{{ t.turma }} - {{ t.turno }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-5">
                                <label for="disciplinaSelect" class="form-label">Disciplina</label>
                                <select id="disciplinaSelect" class="form-select">
                                    <option value="">Selecione...</option>
                                    {% for d in disciplinas %}
                                    <option value="{{ d.disciplina_id }}">{{ d.disciplina }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-2">
                                <button type="button" id="addAtribuicao" class="btn btn-info w-100">Add</button>
                            </div>
                        </div>
                        <h6 class="mt-3">Atribuições a serem salvas:</h6>
                        <ul id="listaAtribuicoes" class="list-group"></ul>
                    </div>
                    <input type="hidden" id="atribuicoes" name="atribuicoes" value="[]">
                    <hr>
                    <button type="submit" class="btn btn-success">Criar Usuário</button>
                </form>
            </div>
        </div>
    </div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const isProfessorCheckbox = document.getElementById('is_professor');
    const professorFields = document.getElementById('professorFields');
    const nomeCompletoInput = document.getElementById('nome_completo');
    const addAtribuicaoBtn = document.getElementById('addAtribuicao');
    const listaAtribuicoes = document.getElementById('listaAtribuicoes');
    const atribuicoesInput = document.getElementById('atribuicoes');

    let atribuicoes = [];

    isProfessorCheckbox.addEventListener('change', function() {
        professorFields.classList.toggle('hidden', !this.checked);
        nomeCompletoInput.required = this.checked;
    });

    addAtribuicaoBtn.addEventListener('click', function() {
        const turmaSelect = document.getElementById('turmaSelect');
        const disciplinaSelect = document.getElementById('disciplinaSelect');

        const turmaId = turmaSelect.value;
        const turmaTexto = turmaSelect.options[turmaSelect.selectedIndex].text;
        const anoLetivo = turmaSelect.options[turmaSelect.selectedIndex].dataset.ano;
        const disciplinaId = disciplinaSelect.value;
        const disciplinaTexto = disciplinaSelect.options[disciplinaSelect.selectedIndex].text;

        if (!turmaId || !disciplinaId) {
            alert('Por favor, selecione uma turma e uma disciplina.');
            return;
        }

        const li = document.createElement('li');
        li.className = 'list-group-item';
        li.textContent = `${turmaTexto} - ${disciplinaTexto} (Ano: ${anoLetivo})`;
        listaAtribuicoes.appendChild(li);

        atribuicoes.push({
            turma_id: turmaId,
            disciplina_id: disciplinaId,
            ano_letivo: anoLetivo
        });

        atribuicoesInput.value = JSON.stringify(atribuicoes);

        turmaSelect.selectedIndex = 0;
        disciplinaSelect.selectedIndex = 0;
    });
});
</script>
</body>
</html>
